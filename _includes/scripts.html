<script src="/assets/js/main.min.js"></script>
<script>
(function() {
  var host = location.hostname;
  document.querySelectorAll('a[href]').forEach(function(a) {
    if (a.hostname && a.hostname !== host) {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    }
  });
})();
</script>
